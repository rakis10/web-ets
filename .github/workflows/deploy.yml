name: Deploy to GitHub Pages

# Build & deploy the static site on every push to the default branch.
on:
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions required by the Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # The site is pure static HTML/CSS — no build step needed.
      # Upload the repository root as the Pages artifact.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
